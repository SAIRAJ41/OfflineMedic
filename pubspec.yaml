# yaml-language-server: $schema=https://json.schemastore.org/pubspec.json
name: offline_medic
description: Offline medical triage app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  whisper_flutter_new: 1.0.1
  llama_cpp_dart: ^0.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  record: ^5.2.0
  permission_handler: ^11.1.0
  http: ^1.1.0
  dio: ^5.4.0
  flutter_markdown: ^0.6.18
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6
  fl_chart: ^0.66.0
  # TODO: Re-enable PDF export after hackathon.
  # pdf: ^3.10.7
  # printing: ^5.11.0
  image_picker: ^1.1.2
  flutter_map: ^6.1.0
  flutter_map_cache: ^1.4.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  url_launcher: ^6.2.2
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/db/
    - assets/images/
    - ai/
    - data/
    - data/Hospitals_data/

dependency_overrides:
  record_linux: ^1.0.0
