name: offline_medic
description: Offline medical triage app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  whisper_flutter_new: 1.0.1   # ← add this
                # for recording audio
  

   # GGUF inference — replaces tflite
  llama_cpp_dart: ^0.2.2
 
   # SQLite for RAG database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

   # Audio recording for Whisper voice input
  record: ^5.2.0
  permission_handler: ^11.1.0
 
  http: ^1.1.0
  dio: ^5.4.0
  flutter_markdown: ^0.6.18
  shared_preferences: ^2.2.2

  cupertino_icons: ^1.0.6

  # 📊 Charts (Dashboard)
  fl_chart: ^0.66.0

  # 📄 PDF Export
  pdf: ^3.10.7

  # 🖼 Gallery Upload
  image_picker: ^1.1.2

  # 🗺 Offline Map
  flutter_map: ^6.1.0
  flutter_map_cache: ^1.4.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  url_launcher: ^6.2.2
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/db/
    - assets/images/
    - ai/
    - data/
    - data/Hospitals_data/

dependency_overrides:
  record_linux: ^1.0.0