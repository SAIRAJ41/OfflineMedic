# This machine is ~7–8 GB RAM: a 8 GB Gradle heap crashed the JVM (native OOM).
# Keep Gradle under ~2 GB so Flutter + OS + IDE still have room.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Less lock contention on Windows + smaller parallel blast radius
org.gradle.parallel=false
org.gradle.workers.max=2

# Slow / flaky networks (wrapper + dependency downloads)
systemProp.org.gradle.internal.http.connectionTimeout=600000
systemProp.org.gradle.internal.http.socketTimeout=600000
